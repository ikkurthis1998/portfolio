services:
  portfolio:
    build: .
    image: portfolio
    container_name: my-portfolio
    restart: always
    expose:
      - "3000"
    # Port mapping removed to disable direct localhost access.
    # Only the tunnel can access the application now.

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: always
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel run
    depends_on:
      - portfolio
