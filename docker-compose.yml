# LOCAL DEV stack. `docker compose up -d` then hit http://localhost:3000.
# Runs a throwaway in-memory SurrealDB + the portfolio wired to it. NO Cloudflare
# tunnel here (the tunnel is prod-only and lives in docker-compose.deploy.yml) — a
# tunnel started locally would bind this machine to the production isree.dev hostname.
#
# The local SurrealDB starts EMPTY, so the dynamic pages render with no data until you
# seed it. To load a snapshot of prod data, export the box's portfolio namespace and
# import it:
#   curl -s -u root:root -H "surreal-ns: portfolio" -H "surreal-db: portfolio" \
#     http://<box>/export > pf.surql   # (run from inside the box's docker network)
#   curl -s -u root:root --data "DEFINE NAMESPACE IF NOT EXISTS portfolio;" http://localhost:18000/sql
#   curl -s -u root:root -H "surreal-ns: portfolio" --data "DEFINE DATABASE IF NOT EXISTS portfolio;" http://localhost:18000/sql
#   curl -s -u root:root -H "surreal-ns: portfolio" -H "surreal-db: portfolio" \
#     --data-binary @pf.surql http://localhost:18000/import
services:
  surrealdb:
    image: surrealdb/surrealdb:v3.0.5
    command: start --user root --pass root --log warn memory
    ports:
      - "18000:8000"   # host:container — load/inspect data via http://localhost:18000

  portfolio:
    build: .
    image: portfolio
    container_name: my-portfolio
    restart: always
    ports:
      - "3000:3000"
    environment:
      - SURREALDB_URL=http://surrealdb:8000
      - SURREALDB_NS=portfolio
      - SURREALDB_DB=portfolio
      - SURREALDB_USER=root
      - SURREALDB_PASS=root   # local throwaway DB credential, not the prod secret
    depends_on:
      - surrealdb
